name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Test (engine)
        run: pnpm --filter @wolf-cup/engine test

      - name: Build engine
        run: pnpm --filter @wolf-cup/engine build

      - name: Test (api)
        run: pnpm --filter @wolf-cup/api test

      - name: Test (tournament-api)
        run: pnpm --filter @tournament/api test

      - name: Test (tournament-web)
        run: pnpm --filter @tournament/web test

      # Browser E2E (T14-1): first real-browser coverage — score entry, the
      # IndexedDB offline queue, start-round picker, invite-claim. Playwright
      # boots the seeded tournament-api (via tsx) + tournament-web (vite) itself.
      # Kept a distinct step so a browser flake is diagnosable apart from units.
      - name: Install Playwright browser (chromium)
        run: pnpm --filter @tournament/web exec playwright install --with-deps chromium

      - name: E2E (tournament-web, browser)
        run: pnpm --filter @tournament/web e2e

      - name: Upload Playwright report
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/tournament-web/playwright-report/
          retention-days: 7

      - name: Lint
        run: pnpm -r lint

      - name: Docker build smoke test
        run: docker compose build
