services:

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: wolf-cup-api
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DB_PATH=/app/data/wolf-cup.db
      - PORT=3000
      - ADMIN_SESSION_SECRET=${ADMIN_SESSION_SECRET}
      - ADMIN_JASON_PASSWORD=${ADMIN_JASON_PASSWORD:-changeme-jason}
      - ADMIN_JOSH_PASSWORD=${ADMIN_JOSH_PASSWORD:-changeme-josh}
      - GHIN_USERNAME=${GHIN_USERNAME:-}
      - GHIN_PASSWORD=${GHIN_PASSWORD:-}
      - R2_ACCOUNT_ID=${R2_ACCOUNT_ID:-}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID:-}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY:-}
      - R2_BUCKET_NAME=${R2_BUCKET_NAME:-}
      - R2_PUBLIC_URL=${R2_PUBLIC_URL:-}
    volumes:
      - sqlite_data:/app/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: wolf-cup-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    networks:
      - internal
      - n8n_default
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=n8n_default"
      # HTTPS router
      - "traefik.http.routers.wolf-cup.rule=Host(`wolf.dagle.cloud`)"
      - "traefik.http.routers.wolf-cup.entrypoints=websecure"
      - "traefik.http.routers.wolf-cup.tls=true"
      - "traefik.http.routers.wolf-cup.tls.certresolver=mytlschallenge"
      - "traefik.http.services.wolf-cup.loadbalancer.server.port=80"
      # HTTP → HTTPS handled globally by Traefik entrypoint config

volumes:
  sqlite_data:

networks:
  internal:
    driver: bridge
  n8n_default:
    external: true
