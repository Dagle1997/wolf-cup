services:

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: wolf-cup-api
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DB_PATH=/app/data/wolf-cup.db
      - PORT=3000
      - ADMIN_SESSION_SECRET=${ADMIN_SESSION_SECRET}
      - ADMIN_JASON_PASSWORD=${ADMIN_JASON_PASSWORD:-changeme-jason}
      - ADMIN_JOSH_PASSWORD=${ADMIN_JOSH_PASSWORD:-changeme-josh}
      - GHIN_USERNAME=${GHIN_USERNAME:-}
      - GHIN_PASSWORD=${GHIN_PASSWORD:-}
      - R2_ACCOUNT_ID=${R2_ACCOUNT_ID:-}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID:-}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY:-}
      - R2_BUCKET_NAME=${R2_BUCKET_NAME:-}
      - R2_PUBLIC_URL=${R2_PUBLIC_URL:-}
      - R2_BACKUP_ACCESS_KEY_ID=${R2_BACKUP_ACCESS_KEY_ID:-}
      - R2_BACKUP_SECRET_ACCESS_KEY=${R2_BACKUP_SECRET_ACCESS_KEY:-}
      - R2_BACKUP_BUCKET_NAME=${R2_BACKUP_BUCKET_NAME:-}
      - EMAIL_USER=${EMAIL_USER:-}
      - EMAIL_APP_PASSWORD=${EMAIL_APP_PASSWORD:-}
      - EMAIL_RECIPIENTS=${EMAIL_RECIPIENTS:-}
      - TZ=America/New_York
    volumes:
      - sqlite_data:/app/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  tournament-api:
    build:
      context: .
      dockerfile: apps/tournament-api/Dockerfile
    container_name: tournament-api
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DB_PATH=/app/data/tournament.db
      - PORT=3000
      - TZ=America/New_York
      # Auth (T1-6a). No `${VAR:-default}` fallbacks — intentional. Zod in
      # apps/tournament-api/src/lib/env.ts marks both REQUIRED with no
      # default; a missing .env.production value triggers a fail-fast at
      # container boot, which is preferable to shipping with a silently
      # wrong cookie scope or CSRF origin.
      - AUTH_COOKIE_DOMAIN=${AUTH_COOKIE_DOMAIN}
      - PUBLIC_APP_URL=${PUBLIC_APP_URL}
      # Google OAuth (T1-6b). Same fail-fast posture as the cookie/url
      # vars above — no `${VAR:-default}` fallback. Missing values on
      # the VPS crash the container at boot via Zod parse rather than
      # shipping a broken auth flow.
      - GOOGLE_OAUTH_CLIENT_ID=${GOOGLE_OAUTH_CLIENT_ID}
      - GOOGLE_OAUTH_CLIENT_SECRET=${GOOGLE_OAUTH_CLIENT_SECRET}
      # Anthropic Vision (T2-3). Same fail-fast posture as the auth vars
      # above — no `${VAR:-default}`. Missing VPS `.env` entry crashes the
      # container at boot via Zod rather than silently 503-ing every
      # scorecard-parse request with an Anthropic auth error.
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      # Optional auto-organizer-promotion on container start (T2-3.2).
      # Empty default → no-op (seed logs `seed_organizer_skipped: env_unset`).
      # Set in /opt/wolf-cup/.env to a Google `sub` to auto-promote that
      # player to organizer on every container start. Idempotent — repeated
      # boots log `seed_organizer_already_set` once promotion sticks.
      - ORGANIZER_GOOGLE_SUB=${ORGANIZER_GOOGLE_SUB:-}
      # GHIN credentials (T3-4). Empty default → ghinClient singleton
      # is null and /api/players/search + /api/players/lookup return
      # 503 service_unavailable. Mirrors Wolf Cup's existing GHIN env
      # wiring at lines 16-17. Set both in /opt/wolf-cup/.env to enable.
      - GHIN_USERNAME=${GHIN_USERNAME:-}
      - GHIN_PASSWORD=${GHIN_PASSWORD:-}
    volumes:
      - tournament_sqlite_data:/app/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: wolf-cup-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    networks:
      - internal
      - n8n_default
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=n8n_default"
      # HTTPS router
      - "traefik.http.routers.wolf-cup.rule=Host(`wolf.dagle.cloud`)"
      - "traefik.http.routers.wolf-cup.entrypoints=websecure"
      - "traefik.http.routers.wolf-cup.tls=true"
      - "traefik.http.routers.wolf-cup.tls.certresolver=mytlschallenge"
      - "traefik.http.services.wolf-cup.loadbalancer.server.port=80"
      # HTTP → HTTPS handled globally by Traefik entrypoint config

  tournament-web:
    build:
      context: .
      dockerfile: apps/tournament-web/Dockerfile
    container_name: tournament-web
    restart: unless-stopped
    depends_on:
      tournament-api:
        condition: service_started
    networks:
      - internal
      - n8n_default
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=n8n_default"
      # HTTPS router
      - "traefik.http.routers.tournament.rule=Host(`tournament.dagle.cloud`)"
      - "traefik.http.routers.tournament.entrypoints=websecure"
      - "traefik.http.routers.tournament.tls=true"
      - "traefik.http.routers.tournament.tls.certresolver=mytlschallenge"
      - "traefik.http.services.tournament.loadbalancer.server.port=80"
      # HTTP → HTTPS handled globally by Traefik entrypoint config

volumes:
  sqlite_data:
  tournament_sqlite_data:

networks:
  internal:
    driver: bridge
  n8n_default:
    external: true
